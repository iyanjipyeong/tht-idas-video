  /payment/callback:
    post:
      tags: [Payments]
      summary: Mock payment callback
      description: Simulasi callback payment gateway untuk mengaktifkan subscription user. Callback hanya boleh diproses untuk transaksi reserved yang sudah dibuat sebelumnya dari `POST /subscriptions`. `transactionId`, `orderId`, `userId`, `tier`, `subscriptionDays`, dan `grossAmount` wajib match dengan data transaksi reserved tersebut.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCallbackRequest'
            examples:
              paidGold:
                summary: Successful callback for reserved transaction that activates subscription
                value:
                  transactionId: sub-11111111-1111-4111-8111-111111111111-1784628000000000000
                  gatewayTransactionId: gw-sub-001
                  orderId: ORDER-SUB-1784628000000000000
                  userId: 11111111-1111-4111-8111-111111111111
                  tier: Gold
                  paymentType: bank_transfer
                  paymentStatus: paid
                  fraudStatus: accept
                  grossAmount: 150000
                  currency: IDR
                  transactionTime: 2026-07-22T10:00:00Z
                  settlementTime: 2026-07-22T10:05:00Z
                  subscriptionDays: 30
              unpaidNotification:
                summary: Reserved transaction callback remains pending because payment not paid
                value:
                  transactionId: sub-11111111-1111-4111-8111-111111111111-1784628000000000001
                  orderId: ORDER-SUB-1784628000000000001
                  userId: 11111111-1111-4111-8111-111111111111
                  tier: Silver
                  paymentStatus: pending
                  grossAmount: 100000
                  subscriptionDays: 30
      responses:
        '200':
          description: Callback processed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentCallbackSuccessResponse'
              examples:
                success:
                  value:
                    success: true
                    code: "200"
                    message: Successfully
                    data: null
        '400':
          description: Invalid payload, invalid subscription state, or mismatched callback transaction.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalidPayload:
                  value:
                    success: false
                    code: E_REQUEST_001
                    message: invalid request payload
                    data: null
                invalidSubscription:
                  value:
                    success: false
                    code: E_REQUEST_001
                    message: invalid subscription
                    data: null
                invalidTierTransition:
                  value:
                    success: false
                    code: E_REQUEST_001
                    message: active subscription cannot be downgraded
                    data: null
                transactionMismatch:
                  value:
                    success: false
                    code: E_PAYMENT_001
                    message: transaction payload does not match reserved transaction
                    data: null
                alreadyProcessed:
                  value:
                    success: false
                    code: E_PAYMENT_001
                    message: transaction has already been processed
                    data: null
        '404':
          description: Referenced resource was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                userNotFound:
                  value:
                    success: false
                    code: E_USER_001
                    message: user not found
                    data: null
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                persistenceFailure:
                  value:
                    success: false
                    code: E_SERVER_001
                    message: internal server error
                    data: null
                unexpectedFailure:
                  value:
                    success: false
                    code: E_SERVER_001
                    message: internal server error
                    data: null
